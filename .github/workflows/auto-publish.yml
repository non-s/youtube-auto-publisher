name: Auto Publish Video

on:
  schedule:
      - cron: '0 10 * * *'
        workflow_dispatch:
            inputs:
                  topic:
                          description: 'Topico do video'
                                  required: false
                                          default: ''
                                                duration:
                                                        description: 'Duracao em segundos'
                                                                required: false
                                                                        default: '60'

                                                                        jobs:
                                                                          publish:
                                                                              runs-on: ubuntu-latest
                                                                                  timeout-minutes: 60

                                                                                      steps:
                                                                                            - name: Checkout repository
                                                                                                    uses: actions/checkout@v4
                                                                                                    
                                                                                                          - name: Setup Python 3.11
                                                                                                                  uses: actions/setup-python@v5
                                                                                                                          with:
                                                                                                                                    python-version: '3.11'
                                                                                                                                              cache: 'pip'
                                                                                                                                              
                                                                                                                                                    - name: Install FFmpeg
                                                                                                                                                            run: |
                                                                                                                                                                      sudo apt-get update
                                                                                                                                                                                sudo apt-get install -y ffmpeg
                                                                                                                                                                                
                                                                                                                                                                                      - name: Install Python dependencies
                                                                                                                                                                                              run: pip install -r requirements.txt
                                                                                                                                                                                              
                                                                                                                                                                                                    - name: Create .env file
                                                                                                                                                                                                            run: |
                                                                                                                                                                                                                      cat > .env << EOF
                                                                                                                                                                                                                                PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}
                                                                                                                                                                                                                                          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
                                                                                                                                                                                                                                                    YOUTUBE_CLIENT_ID=${{ secrets.YOUTUBE_CLIENT_ID }}
                                                                                                                                                                                                                                                              YOUTUBE_CLIENT_SECRET=${{ secrets.YOUTUBE_CLIENT_SECRET }}
                                                                                                                                                                                                                                                                        VIDEO_PRIVACY_STATUS=public
                                                                                                                                                                                                                                                                                  VIDEO_LANGUAGE=pt-BR
                                                                                                                                                                                                                                                                                            EOF
                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                  - name: Restore YouTube token
                                                                                                                                                                                                                                                                                                          run: |
                                                                                                                                                                                                                                                                                                                    echo '${{ secrets.YOUTUBE_TOKEN_JSON }}' > token.json
                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                          - name: Run auto publisher
                                                                                                                                                                                                                                                                                                                                  run: |
                                                                                                                                                                                                                                                                                                                                            TOPIC="${{ github.event.inputs.topic }}"
                                                                                                                                                                                                                                                                                                                                                      DURATION="${{ github.event.inputs.duration }}"
                                                                                                                                                                                                                                                                                                                                                                if [ -z "$TOPIC" ]; then
                                                                                                                                                                                                                                                                                                                                                                            python main.py --duration ${DURATION:-60}
                                                                                                                                                                                                                                                                                                                                                                                      else
                                                                                                                                                                                                                                                                                                                                                                                                  python main.py --topic "$TOPIC" --duration ${DURATION:-60}
                                                                                                                                                                                                                                                                                                                                                                                                            fi
                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                  - name: Upload logs on failure
                                                                                                                                                                                                                                                                                                                                                                                                                          if: failure()
                                                                                                                                                                                                                                                                                                                                                                                                                                  uses: actions/upload-artifact@v4
                                                                                                                                                                                                                                                                                                                                                                                                                                          with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                    name: logs-${{ github.run_id }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                              path: logs/
