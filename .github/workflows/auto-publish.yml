name: YouTube Auto Publisher - 4 Videos por Dia

on:
  schedule:
    # Melhores horarios YouTube (horario de Brasilia -> UTC)
    # 08:00 BRT = 11:00 UTC
    - cron: "0 11 * * *"
    # 12:00 BRT = 15:00 UTC
    - cron: "0 15 * * *"
    # 17:00 BRT = 20:00 UTC
    - cron: "0 20 * * *"
    # 20:00 BRT = 23:00 UTC
    - cron: "0 23 * * *"
  workflow_dispatch:
    inputs:
      topic:
        description: "Topico especifico (deixe vazio para automatico)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: youtube-auto-publisher-production
  cancel-in-progress: false

env:
  TZ: America/Sao_Paulo

jobs:
  publish-video:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v6

      - name: Configurar Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar FFmpeg
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg
          ffmpeg -version

      - name: Instalar dependencias Python
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configurar credenciais YouTube
        env:
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
        run: |
          echo "$YOUTUBE_TOKEN_JSON" > token.json
          echo "Credenciais configuradas"

      - name: Criar video de curiosidades
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          VIDEO_PRIVACY_STATUS: "public"
          ENABLE_AUTO_PUBLISH: "true"
        run: |
          if [ -n "${{ github.event.inputs.topic }}" ]; then
            python main.py --topic "${{ github.event.inputs.topic }}"
          else
            python main.py
          fi

      - name: Persistir estado operacional no GitHub
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin "$GITHUB_REF_NAME"
          shopt -s nullglob
          state_files=(data/used_topics.json data/published_*.json)
          if [ "${#state_files[@]}" -eq 0 ]; then
            echo "Nenhum estado operacional novo para persistir."
            exit 0
          fi
          git add "${state_files[@]}"
          if git diff --cached --quiet; then
            echo "Estado operacional sem mudancas."
            exit 0
          fi
          git commit -m "chore: update publisher state [skip ci]"
          git push

      - name: Upload video como artifact (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: video-${{ github.run_number }}
          path: output/*.mp4
          retention-days: 7
          if-no-files-found: ignore
