name: Production bug
description: Report a publishing workflow issue with enough evidence to reproduce and fix.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: impact
    attributes:
      label: Production impact
      description: Which workflow, API, or publishing step is affected?
      placeholder: "Example: scheduled publish failed, upload retry loop, token refresh issue."
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Steps, command, workflow run URL, or sanitized log path.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Logs, check URLs, or screenshots. Do not paste secrets, OAuth tokens, API keys, or private data.
    validations:
      required: false
